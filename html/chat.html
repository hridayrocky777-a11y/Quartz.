<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quartz AI Workspace</title>
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="html/home.html" class="nav-brand">
        <div class="logo">Q</div>
        <span class="brand-text">QUARTZ</span>
      </a>
      <div class="nav-actions">
        <a href="html/home.html" class="btn btn-secondary">Back to Home</a>
        <button class="btn btn-primary new-chat-btn">New Chat</button>
      </div>
    </div>
  </nav>

  <main class="workspace-page">
    <section class="workspace-shell">
      <div class="panel notes-panel">
        <div class="panel-header">
          <div>
            <h2 class="panel-title">Notes Maker</h2>
            <p class="panel-subtitle">Notebook-style editor for study notes.</p>
          </div>
        </div>

        <div class="toolbar" role="toolbar" aria-label="Note editor toolbar">
          <button class="toolbar-btn" data-command="bold"><strong>B</strong></button>
          <button class="toolbar-btn" data-command="italic"><em>I</em></button>
          <button class="toolbar-btn" data-command="underline"><u>U</u></button>
          <button class="toolbar-btn" data-command="insertUnorderedList">• List</button>
          <button class="toolbar-btn" data-command="insertOrderedList">1. List</button>
          <button class="toolbar-btn" data-command="formatBlock" data-value="h3">H</button>
          <button class="toolbar-btn" data-command="undo">↺</button>
          <button class="toolbar-btn" data-command="redo">↻</button>
          <button class="toolbar-btn" data-action="highlight">✦</button>
          <button class="toolbar-btn" data-action="text-color">A</button>
        </div>

        <div id="notesEditor" class="notes-editor" contenteditable="true" spellcheck="true" data-placeholder="Start typing your notes..."></div>
      </div>

      <div class="panel ai-panel">
        <div class="panel-header">
          <div>
            <h2 class="panel-title">Quartz AI</h2>
            <p class="panel-subtitle">Chat with the AI to summarize, explain, or generate study material.</p>
          </div>
          <button class="panel-reset-btn new-chat-btn">New Chat</button>
        </div>

        <div class="chat-messages" id="chatMessages" aria-live="polite"></div>
        <div class="typing-indicator" id="typingIndicator" hidden>
          <span></span><span></span><span></span>
        </div>

        <div class="composer">
          <textarea id="chatInput" class="chat-input" rows="1" placeholder="Ask Quartz anything..."></textarea>
          <button id="sendBtn" class="send-btn">Send</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/chat.js"></script>
</body>
</html>
